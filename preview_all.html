<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTD 预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; padding: 20px; font-family: "Microsoft YaHei", sans-serif; }
h1 { color: #fff; margin-bottom: 20px; font-size: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.preview { background: #222; border: 1px solid #444; padding: 16px; }
.preview h3 { color: #aaa; font-size: 14px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.card { background: #2D2D2D; padding: 24px; border: 3px solid #555; box-shadow: inset 0 0 0 1px #444; }
.header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #444; }
.server-name { font-size: 36px; font-weight: 700; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; padding: 4px 10px; background: #3C3C3C; border: 1px solid #555; }
.badge-java { color: #55ff55; border-color: #55ff55; }
.badge-bedrock { color: #ffaa00; border-color: #ffaa00; }
.stat-box { background: #333; padding: 20px; border: 2px solid #444; position: relative; }
.stat-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-box.green::before { background: #55ff55; }
.stat-box.orange::before { background: #ffaa00; }
.stat-label { font-size: 16px; color: #777; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.stat-main { display: flex; align-items: flex-end; justify-content: center; gap: 80px; }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 700; }
.stat-value.green { color: #55ff55; }
.stat-value.orange { color: #ffaa00; }
.stat-value .fraction { font-size: 28px; color: #666; }
.version-section { text-align: right; }
.version-label { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.version-text { font-size: 24px; color: #fff; font-weight: 600; }
.version-text.small { font-size: 18px; }
.via-tag { display: inline-block; font-size: 12px; color: #ffaa00; background: rgba(255,170,0,0.15); padding: 2px 6px; margin-top: 4px; border: 1px solid rgba(255,170,0,0.3); }
.motd-section { background: #1a1a1a; border: 2px solid #444; padding: 16px; margin-top: 16px; }
.motd-content { font-size: 14px; line-height: 1.6; color: #ccc; }
.footer { margin-top: 16px; display: flex; justify-content: space-between; font-size: 12px; color: #555; }
.footer-line { flex: 1; height: 1px; background: #444; align-self: center; margin: 0 12px; }
</style>
</head>
<body>
<h1>MOTD 版本显示预览</h1>
<div class="preview">
<div class="card">
  <div class="header">
    <span class="server-name">mc.hypixel.net</span>
    <span class="badge badge-java">Java</span>
  </div>
  <div class="stat-box green">
    <div class="stat-label">在线玩家</div>
    <div class="stat-main">
      <div><div class="stat-value green">48523<span class="fraction">/200000</span></div></div>
      <div class="version-section">
        <div class="version-label">服务器版本</div>
        <div class="version-text">1.21.4</div>
      </div>
    </div>
  </div>
  <div class="motd-section"><div class="motd-content">Hypixel Server</div></div>
  <div class="footer"><span>MOTD 查询</span><div class="footer-line"></div><span>Hayston1001</span></div>
</div>
</div>
</body>
</html>
